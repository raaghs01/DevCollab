# Fly.io app config for the realtime server. Deploy from within server/:
#   fly launch --no-deploy   (first time; pick/confirm a unique app name)
#   fly secrets set NEXT_INTERNAL_API_URL=... REALTIME_SERVER_INTERNAL_SECRET=... CORS_ORIGIN=...
#   fly deploy

app = "devcollab-realtime"  # must be globally unique on Fly — rename this
primary_region = "iad"      # pick the region closest to your Vercel deployment

[build]

[env]
  PORT = "4000"

# WebSocket connections are long-lived — don't let Fly scale this to zero or
# stop the machine on perceived idle, that would drop every open connection.
[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
